<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main style="background-color: brown;" class="main-grid">
        <section class="container active">
            <div class="btn-container" id="addTodo" >
                <button id="addTodo-btn" class="addTodo">+</button>
            </div>
        </section>
        <dialog id="myDialog">
            <form method="dialog" class="dialog-form">
                <h2>What's the theme?</h2>
                <input type="text" id="userAnswer" class="theme">
                <div class="options-continer">
                    <div class="options-continer__div">
                        <label for="marker">Marker</label>
                        <input type="text" id="marker" maxlength="2" class="marker-input">
                    </div>
                    <div class="options-continer__div">
                        <label for="color">color</label>
                        <input type="color" id="color">
                    </div>
                </div>
                <div class="dialog-btn__container">
                    <button class="dialog-btn" id="btn-cancel">Cancel</button>
                    <button class="dialog-btn" id="btn-acept" value="default">Add</button>
                </div>
            </form>
        </dialog>
    </main>
    <section class="container">
        <div id="list-container" class="list-container">
            <header>
                <h1 id="title">To-Do App</h1>
                <div id="ipt-cont">
                    <input type="text" id="input" class="input">
                    <button id="btn" class="btn">ADD</button>
                </div>
            </header>
            <ul id="list" class="list">

            </ul>
        </div>
    </section>
    <script src="./main.js"></script>
</body>
</html>
